###########################################################################################
# Refer to the README for settings and explanations. As shipped this configuration
# file excludes dotnet-uptime itself from monitoring and only pulls in the most
# basic System.Runtime metrics. At least one endpoint must be configured before it
# can be run in service mode. For production deployment it is strongly recommended
# to secure the application directory.

###########################################################################################
# The [app] section has general configuration items.

[app]
pscan=15000
diags=15000
maxhistograms=10
maxtimeseries=1000
loglevel=warning
summarycommand=disabled
redactpayload=true

###########################################################################################
# The [include] and [exclude] sections filter which processes are monitored. The sections
# are mutually exclusive; choose one only. If neither is used, all eligible processes are
# monitored.
#
# An entry matches either the executable filename or the managed entrypoint
# assembly name (case-insensitive). Filename is the only option for native hosts
# such as w3wp.exe; assembly name is the only useful option for apps launched as
# "dotnet myapp.dll", where every filename is "dotnet". If both could match, the
# entry naming the entrypoint assembly wins.
#
# Uptime is an ordinary .NET process and is not special-cased, so without an
# [exclude] entry, it monitors itself and any other running Uptime instance (a
# "stats" or "summary" invocation, for example). Delete that exclusion to collect
# standard runtime metrics about Uptime itself. Because the name matches both
# the filename and the entrypoint assembly, one entry covers every instance.
#
# The w3wp exclusion below demonstrates Specifier regex. In this case on windows
# it would prevent monitoring of DefaultAppPool IIS processes.

[exclude]
dotnet-uptime
#oneagent.exe
#w3wp.exe: -ap """"(?<Specifier>DefaultAppPool)""""

#[include]
#w3wp.exe
#PowerToys.exe

###########################################################################################
# The [diags] section controls the diagnostic providers from which Uptime collects
# metrics If this section is missing or empty, System.Runtime is the default (all
# runtime metrics from all monitored processes).
#
# Uptime's own operational metrics are published on the "dotnet-uptime.self"
# meter. Like any custom meter, they are only collected if listed in [diags],
# and only if Uptime is not excluded above. The "stats" command reads them
# directly from the running service regardless of either setting.

[diags]
System.Runtime

###########################################################################################
# [processtags] adds data tags to metrics for each monitored process. List
# each explicitly; wildcards are not supported. Without at least "assembly"
# or "filename" the only process identity in the exported data is the PID.
#
#   assembly     process.assembly          managed entrypoint assembly
#   filename     process.executable.name   executable filename
#   pathname     process.executable.path   full executable path
#   commandline  process.command_line      full command line (SEE WARNING BELOW)
#   clrversion   process.runtime.version   CLR product version
#   arch         process.architecture      x64, arm64, etc
#   rid          process.runtime.rid       portable RID (.NET 9+ only)
#   cookie       process.runtime.cookie    runtime instance ID, distinguishes PID reuse
#   specifier    process.specifier         value captured by an include/exclude rule regex
#
# WARNING: command lines routinely contain connection strings, tokens and passwords.
# The "redactpayload" setting above (default true) redacts recognizable secrets from the
# exported "commandline" tag, but it is a mitigation, not a guarantee -- see the README.

[processtags]
pathname
#assembly
#clrversion

###########################################################################################
# [hosttags] are values describing this host, emitted as OTel resource attributes on
# everything Uptime exports (as opposed to [processtags], which describe each
# individual monitored process). host.name and os.type are always emitted; listing
# them here overrides the built-in values.
#
# Values may contain %tokens%:
#   %machinename%     Environment.MachineName
#   %fqdn%            fully-qualified domain name, falls back to the machine name
#   %osversion%       OS description string
#   %osname%          windows, linux
#   %uptimeversion%   this application's version
#   %env:NAME%        an environment variable of the Uptime process
#
# Service mode refuses to start if a referenced environment variable is not set.

[hosttags]
#environment=QA
#datacenter=us-east
#node=%machinename%-web

###########################################################################################
# The [otlp] section lists your custom names for your various OLTP push targets.
# Each name listed must have a corresponding section defining endpoint settings.

[otlp]
#local-collector
#splunk

# This section marker matches a name listed in the [otlp] section above.
#[local-collector]
#endpoint=http://localhost:4317
#protocol=grpc
#timeout=10000

# This section marker matches a name listed in the [otlp] section above.
#[splunk]
#endpoint=https://ingest.signalfx.com/v2/datapoint/otlp
#header=X-SF-Token:your-token-here

###########################################################################################
# The [http] section identifies a single HTTP scrape input (pull mode).
# Only one [http] section is permitted. Currently "prometheus" is the only
# defined data format.

[http]
#type=prometheus
#endpoint=http://localhost:9464

###########################################################################################
